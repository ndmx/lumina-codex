name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run the bundled JS actions on the runner's Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: lint · test · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24] # supported range; 24 is the development baseline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      - name: Build @xlumina/system
        run: npm run build
        working-directory: packages/lumina-system

  # The Next.js app build is heavier — verify it once, on the Node 24 baseline.
  app-build:
    name: app build (Node 24)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
